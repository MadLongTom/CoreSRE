    import os, time, random, logging, json
    from flask import Flask, request, jsonify
    from prometheus_client import Counter, Histogram, Gauge, generate_latest, CONTENT_TYPE_LATEST
    from common import setup_logging, setup_tracing, SERVICE_NAME

    setup_logging()
    tracer = setup_tracing("inventory-service")
    logger = logging.getLogger("inventory-service")

    from opentelemetry.instrumentation.flask import FlaskInstrumentor
    from opentelemetry import trace

    app = Flask(__name__)
    FlaskInstrumentor().instrument_app(app)

    REQUEST_COUNT = Counter('http_requests_total', 'Total HTTP requests',
                            ['method', 'endpoint', 'status', 'app'])
    REQUEST_DURATION = Histogram('http_request_duration_seconds', 'HTTP request duration',
                                 ['method', 'endpoint', 'app'],
                                 buckets=[0.01, 0.025, 0.05, 0.1, 0.25, 0.5, 1, 2.5, 5])
    INVENTORY_LEVEL = Gauge('inventory_level', 'Current inventory level', ['product_id', 'app'])

    # Simulate inventory state
    inventory = {f"SKU-{i}": random.randint(50, 200) for i in range(100, 200)}

    @app.route('/health')
    def health():
        return jsonify({"status": "ok", "service": "inventory-service"})

    @app.route('/metrics')
    def metrics():
        # Export a few inventory levels as gauges
        for sku in list(inventory.keys())[:10]:
            INVENTORY_LEVEL.labels(product_id=sku, app="inventory-service").set(inventory[sku])
        return generate_latest(), 200, {'Content-Type': CONTENT_TYPE_LATEST}

    @app.route('/api/inventory/reserve', methods=['POST'])
    def reserve_inventory():
        start = time.time()
        span = trace.get_current_span()
        trace_id = format(span.get_span_context().trace_id, '032x') if span.get_span_context().is_valid else ""

        try:
            data = request.get_json(silent=True) or {}
            product_id = data.get("product_id", "SKU-100")
            quantity = data.get("quantity", 1)

            # Simulate processing
            time.sleep(random.uniform(0.01, 0.08))

            if random.random() < 0.02:  # 2% out-of-stock
                raise Exception(f"Insufficient stock for {product_id}")

            current = inventory.get(product_id, 100)
            inventory[product_id] = max(0, current - quantity)

            logger.info(f"Inventory reserved: {product_id} x{quantity}, remaining={inventory[product_id]}",
                       extra={"trace_id": trace_id, "span_id": ""})

            duration = time.time() - start
            REQUEST_COUNT.labels(method='POST', endpoint='/api/inventory/reserve', status='200', app='inventory-service').inc()
            REQUEST_DURATION.labels(method='POST', endpoint='/api/inventory/reserve', app='inventory-service').observe(duration)
            return jsonify({"status": "reserved", "product_id": product_id, "remaining": inventory[product_id]})

        except Exception as e:
            duration = time.time() - start
            REQUEST_COUNT.labels(method='POST', endpoint='/api/inventory/reserve', status='500', app='inventory-service').inc()
            REQUEST_DURATION.labels(method='POST', endpoint='/api/inventory/reserve', app='inventory-service').observe(duration)
            logger.error(f"Inventory reservation failed: {e}",
                        extra={"trace_id": trace_id, "span_id": ""})
            return jsonify({"error": str(e)}), 500

    @app.route('/api/inventory', methods=['GET'])
    def list_inventory():
        start = time.time()
        time.sleep(random.uniform(0.005, 0.02))
        duration = time.time() - start
        REQUEST_COUNT.labels(method='GET', endpoint='/api/inventory', status='200', app='inventory-service').inc()
        REQUEST_DURATION.labels(method='GET', endpoint='/api/inventory', app='inventory-service').observe(duration)
        items = [{"product_id": k, "quantity": v} for k, v in list(inventory.items())[:20]]
        return jsonify({"items": items})

    if __name__ == '__main__':
        logger.info("Inventory service starting on port 8080")
        app.run(host='0.0.0.0', port=8080)

  traffic_generator.py: |
    """
    Traffic generator — runs as a CronJob or sidecar to continuously
    hit the order-service and generate realistic telemetry data.
    """
    import time, random, urllib.request, json, logging, sys
    from common import setup_logging

    setup_logging()
    logger = logging.getLogger("traffic-generator")

    ORDER_URL = "http://order-service:8080"
    PAYMENT_URL = "http://payment-service:8080"
    INVENTORY_URL = "http://inventory-service:8080"

    def make_request(method, url, data=None):
        try:
            req = urllib.request.Request(url, method=method)
            if data:
                req.data = json.dumps(data).encode()
                req.add_header("Content-Type", "application/json")
            resp = urllib.request.urlopen(req, timeout=10)
            return resp.status
        except Exception as e:
            logger.warning(f"Request failed: {method} {url}: {e}")
            return 0

    def run():
        logger.info("Traffic generator starting — generating load for demo-app")
        cycle = 0
        while True:
            cycle += 1
            # Create orders (most traffic)
            for _ in range(random.randint(2, 8)):
                make_request("POST", f"{ORDER_URL}/api/orders",
                            {"items": [{"sku": f"SKU-{random.randint(100,199)}", "qty": random.randint(1,3)}]})
                time.sleep(random.uniform(0.2, 1.0))

            # List orders
            make_request("GET", f"{ORDER_URL}/api/orders")

            # Direct payment check
            if random.random() < 0.3:
                make_request("POST", f"{PAYMENT_URL}/api/payments",
                            {"amount": random.uniform(5, 200)})

            # Direct inventory check
            if random.random() < 0.3:
                make_request("GET", f"{INVENTORY_URL}/api/inventory")

            # Health checks
            for svc_url in [ORDER_URL, PAYMENT_URL, INVENTORY_URL]:
                make_request("GET", f"{svc_url}/health")

            if cycle % 10 == 0:
                logger.info(f"Traffic cycle {cycle} completed")

            time.sleep(random.uniform(1, 3))

    if __name__ == '__main__':
        run()

---
# ──────────────────── Deployments ────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: demo-app
  labels:
    app: order-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      initContainers:
        - name: install-deps
          image: python:3.12-slim
          command: ["pip", "install", "--target=/app/site-packages", "-r", "/app/src/requirements.txt"]
          volumeMounts:
            - name: code
              mountPath: /app/src/requirements.txt
              subPath: requirements.txt
            - name: site-packages
              mountPath: /app/site-packages
      containers:
        - name: app
          image: python:3.12-slim
          command: ["python", "/app/src/order_service.py"]
          env:
            - name: SERVICE_NAME
              value: "order-service"
            - name: PYTHONPATH
              value: "/app/site-packages:/app/src"
            - name: PAYMENT_URL
              value: "http://payment-service:8080"
            - name: INVENTORY_URL
              value: "http://inventory-service:8080"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://jaeger.observability.svc.cluster.local:4318"
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: code
              mountPath: /app/src
            - name: site-packages
              mountPath: /app/site-packages
      volumes:
        - name: code
          configMap:
            name: service-code
        - name: site-packages
          emptyDir: {}

