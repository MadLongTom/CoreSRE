apiVersion: apps/v1
kind: Deployment
metadata:
  name: traffic-generator
  namespace: demo-app
  labels:
    app: traffic-generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traffic-generator
  template:
    metadata:
      labels:
        app: traffic-generator
    spec:
      initContainers:
        - name: install-deps
          image: python:3.12-slim
          command: ["pip", "install", "--target=/app/site-packages", "-r", "/app/src/requirements.txt"]
          volumeMounts:
            - name: code
              mountPath: /app/src/requirements.txt
              subPath: requirements.txt
            - name: site-packages
              mountPath: /app/site-packages
        - name: wait-for-services
          image: python:3.12-slim
          command: ["sh", "-c", "echo 'Waiting 30s for services to start...'; sleep 30"]
      containers:
        - name: generator
          image: python:3.12-slim
          command: ["python", "/app/src/traffic_generator.py"]
          env:
            - name: SERVICE_NAME
              value: "traffic-generator"
            - name: PYTHONPATH
              value: "/app/site-packages:/app/src"
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: code
              mountPath: /app/src
            - name: site-packages
              mountPath: /app/site-packages
      volumes:
        - name: code
          configMap:
            name: service-code
        - name: site-packages
          emptyDir: {}

