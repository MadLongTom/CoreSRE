# ──────────────────── 模拟分布式业务系统 ────────────────────
# 使用 Python + prometheus_client 模拟 3 个微服务:
#   - order-service   (接收订单 → 调用 payment + inventory)
#   - payment-service (模拟支付处理)
#   - inventory-service (模拟库存扣减)
# 每个服务输出:
#   - Prometheus metrics (/metrics)
#   - JSON structured logs (stdout → Promtail)
#   - Trace ID 传播 (通过 header)
# ────────────────────────────────────────────────────────

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: service-code
  namespace: demo-app
data:
  requirements.txt: |
    prometheus_client==0.22.1
    opentelemetry-api==1.33.0
    opentelemetry-sdk==1.33.0
    opentelemetry-exporter-otlp-proto-http==1.33.0
    opentelemetry-instrumentation-urllib==0.54b0
    flask==3.1.1
    opentelemetry-instrumentation-flask==0.54b0

  common.py: |
    import os, json, time, random, uuid, logging, sys
    from datetime import datetime, timezone
    from functools import wraps

    SERVICE_NAME = os.environ.get("SERVICE_NAME", "unknown")

    class JsonFormatter(logging.Formatter):
        def format(self, record):
            log_entry = {
                "timestamp": datetime.now(timezone.utc).isoformat(),
                "level": record.levelname.lower(),
                "msg": record.getMessage(),
                "service": SERVICE_NAME,
                "logger": record.name,
            }
            if hasattr(record, "trace_id") and record.trace_id:
                log_entry["trace_id"] = record.trace_id
            if hasattr(record, "span_id") and record.span_id:
                log_entry["span_id"] = record.span_id
            if record.exc_info:
                log_entry["exception"] = self.formatException(record.exc_info)
            return json.dumps(log_entry)

    def setup_logging():
        handler = logging.StreamHandler(sys.stdout)
        handler.setFormatter(JsonFormatter())
        root = logging.getLogger()
        root.handlers.clear()
        root.addHandler(handler)
        root.setLevel(logging.INFO)
        # suppress noisy libs
        logging.getLogger("urllib3").setLevel(logging.WARNING)
        logging.getLogger("werkzeug").setLevel(logging.WARNING)

    def setup_tracing(service_name):
        from opentelemetry import trace
        from opentelemetry.sdk.trace import TracerProvider
        from opentelemetry.sdk.trace.export import BatchSpanProcessor
        from opentelemetry.sdk.resources import Resource
        from opentelemetry.exporter.otlp.proto.http.trace_exporter import OTLPSpanExporter

        otel_endpoint = os.environ.get("OTEL_EXPORTER_OTLP_ENDPOINT", "http://jaeger.observability.svc.cluster.local:4318")

        resource = Resource.create({"service.name": service_name})
        provider = TracerProvider(resource=resource)
        exporter = OTLPSpanExporter(endpoint=f"{otel_endpoint}/v1/traces")
        provider.add_span_processor(BatchSpanProcessor(exporter))
        trace.set_tracer_provider(provider)
        return trace.get_tracer(service_name)

  order_service.py: |
    import os, time, random, logging, urllib.request, json
    from flask import Flask, request, jsonify
    from prometheus_client import Counter, Histogram, generate_latest, CONTENT_TYPE_LATEST
    from common import setup_logging, setup_tracing, SERVICE_NAME

    setup_logging()
    tracer = setup_tracing("order-service")
    logger = logging.getLogger("order-service")

    from opentelemetry.instrumentation.flask import FlaskInstrumentor
    from opentelemetry.instrumentation.urllib import URLLibInstrumentor
    from opentelemetry import trace

    app = Flask(__name__)
    FlaskInstrumentor().instrument_app(app)
    URLLibInstrumentor().instrument()

    REQUEST_COUNT = Counter('http_requests_total', 'Total HTTP requests',
                            ['method', 'endpoint', 'status', 'app'])
    REQUEST_DURATION = Histogram('http_request_duration_seconds', 'HTTP request duration',
                                 ['method', 'endpoint', 'app'],
                                 buckets=[0.01, 0.025, 0.05, 0.1, 0.25, 0.5, 1, 2.5, 5])
    ORDER_TOTAL = Counter('orders_total', 'Total orders processed', ['status', 'app'])

    PAYMENT_URL = os.environ.get("PAYMENT_URL", "http://payment-service:8080")
    INVENTORY_URL = os.environ.get("INVENTORY_URL", "http://inventory-service:8080")

    @app.route('/health')
    def health():
        return jsonify({"status": "ok", "service": "order-service"})

    @app.route('/metrics')
    def metrics():
        return generate_latest(), 200, {'Content-Type': CONTENT_TYPE_LATEST}

    @app.route('/api/orders', methods=['POST'])
    def create_order():
        start = time.time()
        span = trace.get_current_span()
        trace_id = format(span.get_span_context().trace_id, '032x') if span.get_span_context().is_valid else ""

        try:
            # Simulate processing
            time.sleep(random.uniform(0.01, 0.05))

            # Call payment service
            payment_req = urllib.request.Request(
                f"{PAYMENT_URL}/api/payments",
                data=json.dumps({"amount": random.uniform(10, 500), "order_id": random.randint(1000, 9999)}).encode(),
                headers={"Content-Type": "application/json"}
            )
            payment_resp = urllib.request.urlopen(payment_req, timeout=5)
            payment_result = json.loads(payment_resp.read())

            # Call inventory service
            inv_req = urllib.request.Request(
                f"{INVENTORY_URL}/api/inventory/reserve",
                data=json.dumps({"product_id": f"SKU-{random.randint(100,999)}", "quantity": random.randint(1,5)}).encode(),
                headers={"Content-Type": "application/json"}
            )
            inv_resp = urllib.request.urlopen(inv_req, timeout=5)
            inv_result = json.loads(inv_resp.read())

            status = "201"
            ORDER_TOTAL.labels(status="success", app="order-service").inc()
            logger.info("Order created successfully", extra={"trace_id": trace_id, "span_id": ""})

            duration = time.time() - start
            REQUEST_COUNT.labels(method='POST', endpoint='/api/orders', status=status, app='order-service').inc()
            REQUEST_DURATION.labels(method='POST', endpoint='/api/orders', app='order-service').observe(duration)

            return jsonify({"status": "created", "payment": payment_result, "inventory": inv_result}), 201

        except Exception as e:
            duration = time.time() - start
            status = "500"
            REQUEST_COUNT.labels(method='POST', endpoint='/api/orders', status=status, app='order-service').inc()
            REQUEST_DURATION.labels(method='POST', endpoint='/api/orders', app='order-service').observe(duration)
            ORDER_TOTAL.labels(status="failed", app="order-service").inc()
            logger.error(f"Order creation failed: {e}", extra={"trace_id": trace_id, "span_id": ""})
            return jsonify({"error": str(e)}), 500

    @app.route('/api/orders', methods=['GET'])
    def list_orders():
        start = time.time()
        time.sleep(random.uniform(0.005, 0.02))
        duration = time.time() - start
        REQUEST_COUNT.labels(method='GET', endpoint='/api/orders', status='200', app='order-service').inc()
        REQUEST_DURATION.labels(method='GET', endpoint='/api/orders', app='order-service').observe(duration)
        return jsonify({"orders": [{"id": i, "status": "completed"} for i in range(1, 6)]})

    if __name__ == '__main__':
        logger.info("Order service starting on port 8080")
        app.run(host='0.0.0.0', port=8080)

